name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'LF-Server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LF-Server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LF-Server/package-lock.json

      - run: npm ci

      - run: npm run deploy
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
